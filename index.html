<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QrCodeGen</title>
</head>
<body>
    <h1 style="color: #ffffff;">QrCode Generator</h1>
    <input id="input" class="textinput" type="text" placeholder="Input a text">
    <br>
    <div style="background-color: rgb(115, 115, 115); padding: 1em; color: #ffffff; border-radius: 1em; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div style="color: #ffffff; font-size: larger;">
            Color1: <input id="color1" class="colorinput" type="color" value="#000000">
        </div>
        <div style="color: #ffffff; font-size: larger;">
            Color2: <input id="color2" class="colorinput" type="color" value="#ffffff">
        </div>
        It's recommended to use a dark color for Color1 and a light color for Color2.
    </div>
    <br>
    <div id="qrcode" class="qrcode" ></div>
    <div style="color: #ffffff; font-size: x-large ;">Current content:</div>
    <div id="currentcontent" style="color: #ffffff; font-size: larger ; background-color: rgb(82, 82, 82); padding: 0.5em;">-</div>
    <br>
    <button onclick="genqrcode()">Generate</button>
    <br>
    <hr>
    <br>
    <button onclick="download()">Download</button>
    <div class="format">
        Format:
        <br>
        <select>
            <option value="png">PNG</option>
            <option value="svg">SVG</option>
        </select>
        <div class="resolution">
        Resolution:
        <br>
        <select id="resolutionSelect">
            <option value="800">800x800 (Normal)</option>
            <option value="400">400x400 (Low)</option>
            <option value="1200">1200x1200 (High)</option>
        </select>
        <div style="color: #ffffff; font-size: smaller; margin-top: 0.5em; max-width: 12em; text-align: center;">
        The resolution only affects the the the look of the png format.
        </div>
        </div>
    </div>
    <br>
</body>
</html>
<style>
    * {
        box-sizing: border-box;
    }

    hr {
        width: 95%;
        
        border: 1px solid #ffffff;
    }

    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: rgb(90, 90, 90);
    }

    .textinput {
        width: 95%;
        max-width: 400px;
        height: 3em;
        margin: 8px;
        padding: 0.5em;
        border-radius: 0.5em;
        border: 2px solid #ffffff;
        background-color: rgb(255, 255, 255);
    }

    .colorinput {
        background-color: rgb(94, 94, 94);
        border: 0px solid #ffffff;
    }

    .qrcode {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 8px;
        padding: 1em;
        background-color: gray;
        border: 2px solid #ffffff;
        border-radius: 2em;
        width: 95%;
        max-width: 400px;
        aspect-ratio: 1/1;
    }
    .qrcode img {
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 1/1 !important;
    }   
    button {
        background-color: rgb(255, 255, 255);
        border: 2px solid #ffffff;
        border-radius: 0.5em;
        width: 10em;
        height: 2em;
        font-size: large;        
    }

    select {
        background-color: rgb(255, 255, 255);
        border: 2px solid #ffffff;
        border-radius: 0.5em;
        max-width: 12em;
        width: 12em;
        height: 2em;
        font-size: large;
    }

    .format {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: rgb(115, 115, 115);
        border-radius: 1em;
        padding: 0.5em;
        color: #ffffff;
        font-size: larger;
        margin-top: 1em;
    }

    .resolution {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0.5em;
        color: #ffffff;
    }

</style>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    var qrcode = new QRCode("qrcode", {       
        colorDark : "#ffffff",        
        colorLight : "#000000",
        height : 256,
        width : 256,        
        correctLevel : QRCode.CorrectLevel.H         
    });
    function genqrcode() {
        var content = document.getElementById("input")
        if (!content.value) {
            alert("Input a text");
            content.focus();
            return;
        }
        color1 = document.getElementById("color1");
        color2 = document.getElementById("color2");
        qrcode._htOption.colorDark = color1.value;   
        qrcode._htOption.colorLight = color2.value; 
        qrcode.makeCode(content.value);
        
        var currentcontent = document.getElementById("currentcontent");
        currentcontent.innerHTML = content.value;
    };
    function download() {

        if (document.querySelector("select").value === "svg") {
            downloadSVG();
            return;
        }

        var qrContainer = document.getElementById("qrcode");
        var img = qrContainer.querySelector("img");

        if (!img || !img.src) {
            alert("Generate a QR code first!");
            return;
        }
        
        var downloadCanvas = document.createElement("canvas");
        var ctx = downloadCanvas.getContext("2d");

        var dlink = document.createElement("a")
        downloadCanvas.width = document.getElementById("resolutionSelect").value;
        downloadCanvas.height = document.getElementById("resolutionSelect").value;
        ctx.drawImage(img, 0, 0, downloadCanvas.width, downloadCanvas.height);


        dlink.href = downloadCanvas.toDataURL("image/png");
        dname = currentcontent.innerHTML +".png"
        dlink.download = dname

        document.body.appendChild(dlink);
        dlink.click();
        document.body.removeChild(dlink);
    
    }
    function downloadSVG() {
        var img = document.getElementById("qrcode").querySelector("img");
        var content = document.getElementById("currentcontent").innerHTML;

        if (!img || !img.src || content === "-") {
            alert("Generate a QR code first!");
            return;
        }

        var svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="${document.getElementById("resolutionSelect").value}" height="${document.getElementById("resolutionSelect").value}" viewBox="0 0 256 256">
            <image href="${img.src}" x="0" y="0" width="256" height="256" style="image-rendering: pixelated;" />
        </svg>`;

        var dlink = document.createElement("a");
        dlink.href = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgString);
        dlink.download = content + ".svg";

        document.body.appendChild(dlink);
        dlink.click();
        document.body.removeChild(dlink);
    }
    

</script>
